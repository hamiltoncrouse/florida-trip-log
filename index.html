<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Carmem & Eric's Florida Trip</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #fdfdfd;
      --text: #1a1a1a;
      --accent: #2c3e50;
      --muted: #7f8c8d;
      --radius: 0px; /* Classic sharp look */
      --shadow: 0 10px 30px rgba(0,0,0,0.05);
    }
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .header {
      padding: 100px 20px 60px;
      text-align: center;
      background: white;
    }
    .header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 4rem;
      font-weight: 400;
      margin: 0;
      letter-spacing: -0.02em;
    }
    .header p {
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.3em;
      color: var(--muted);
      margin-top: 20px;
    }
    .intro {
      max-width: 600px;
      margin: 0 auto 80px;
      text-align: center;
      line-height: 1.8;
      font-size: 1.1rem;
      color: #444;
    }
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 40px;
    }
    .gallery {
      columns: 3 300px;
      column-gap: 40px;
    }
    .item {
      break-inside: avoid;
      margin-bottom: 40px;
      background: white;
      padding: 15px;
      box-shadow: var(--shadow);
    }
    .item img {
      width: 100%;
      display: block;
    }
    .item-content {
      padding: 20px 0 10px;
    }
    .item-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      font-style: italic;
      margin: 0 0 8px 0;
    }
    .item-desc {
      font-size: 0.9rem;
      line-height: 1.6;
      color: var(--muted);
      margin: 0;
    }
    .item-meta {
      margin-top: 12px;
      font-size: 0.75rem;
      color: #ccc;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    footer {
      text-align: center;
      padding: 100px 20px;
      color: var(--muted);
      font-size: 0.8rem;
      letter-spacing: 0.1em;
    }
    @media (max-width: 800px) {
      .header h1 { font-size: 2.8rem; }
      .container { padding: 0 20px; }
      .gallery { columns: 1; }
    }
  </style>
</head>
<body>
  <header class="header">
    <h1>Florida Trip</h1>
    <p>Carmem & Eric — Feb 2026</p>
  </header>

  <div class="intro">
    A visual diary of our time in St. Augustine. From the historic coquina walls of Castillo de San Marcos to the gilded halls of the Gilded Age, we explored the oldest corners of Florida.
  </div>

  <main class="container">
    <div class="gallery" id="gallery">
      <!-- Photos injected here -->
    </div>
  </main>

  <footer>
    ST. AUGUSTINE, FLORIDA &middot; FEBRUARY 2026
  </footer>

    const gallery = document.getElementById('gallery');
    photos.forEach(photo => {
      const el = document.createElement('div');
      el.className = 'item';
      el.innerHTML = `
        <img src="${photo.src}=w800" alt="${photo.title}" loading="lazy">
        <div class="item-content">
          <h2 class="item-title">${photo.title}</h2>
          <p class="item-desc">${photo.desc}</p>
          <div class="item-meta">Feb 2026 &middot; St. Augustine</div>

      gallery.appendChild(el);

</body>
</html>
