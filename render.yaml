services:
  - type: web
    name: florida-trip-log
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma db push --accept-data-loss && node prisma/seed.js && npm run build
    startCommand: npm run start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: my-data-vibe # Assuming this is the DB name from the README context or similar
          property: connectionString
      - key: NODE_VERSION
        value: 20
